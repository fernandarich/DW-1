<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grêmio - Login</title>

    <!-- ligação com o CSS -->
    <link rel="stylesheet" href="styleI.css">
</head>

<body>

    <div class="container">
        <div class="image-box"></div>

        <!-- LADO DO LOGIN -->
        <div class="login-box">
            <h1>Bem-vindo ao site do Imortal Tricolor</h1>
            <h3>Faça login para acessar sua conta</h3>
            <br>

            <form id="formLogin">
                <label for="email">Email:</label>
                <input type="email" id="email" required>

                <label for="senha">Senha:</label>
                <input type="password" id="senha" required>

                <button type="submit">Entrar</button>
            </form>
            <br>
            <p><a href="Hforgot-password.html">Esqueci minha senha</a></p>
            <p>Não tem conta? <a href="Hcadastro.html">Cadastre-se aqui</a></p>
        </div>


    </div>
    <!-- SCRIPT DO LOGIN -->
    <script>
        document.getElementById("formLogin").addEventListener("submit", function (event) {
            event.preventDefault();

            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;

            const emailSalvo = localStorage.getItem("email");
            const senhaSalva = localStorage.getItem("senha");

            if (email === "admin@gmail.com" && senha === "123456") {
                alert("Bem-vindo, admin!");
                localStorage.setItem("admin@gmail.com", email);
                localStorage.setItem("123456", senha);
                window.location.href = "Hhome.html";
            }
            else if (email === emailSalvo && senha === senhaSalva) {
                alert("Login bem-sucedido!");
                window.location.href = "Hhome.html";
            } else {
                alert("Email ou senha incorretos!");
            }

        });
    </script>

</body>

</html>
